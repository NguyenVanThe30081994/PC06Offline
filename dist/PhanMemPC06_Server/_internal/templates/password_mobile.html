{% extends "base_mobile.html" %}

{% block title %}Đổi mật khẩu - PC06 Mobile{% endblock %}

{% block content %}
<div class="animate__animated animate__fadeIn">
    <!-- Header Page -->
    <div class="mb-4 text-center">
        <div class="d-inline-flex p-3 rounded-circle bg-primary bg-opacity-10 mb-3">
            <i class="fa-solid fa-key text-primary fs-3"></i>
        </div>
        <h4 class="fw-bold text-dark">Cập nhật Mật khẩu</h4>
        <p class="text-muted small">Vui lòng nhập mật khẩu mới để bảo vệ tài khoản</p>
    </div>

    <!-- Form Section -->
    <div class="mobile-card">
        <div class="badge bg-primary bg-opacity-10 text-primary rounded-pill mb-4 px-3 fw-bold tiny letter-spacing-1 uppercase">Bảo mật tài khoản</div>
        
        <form method="POST">
            <div class="mb-4">
                <label class="form-label fw-bold text-muted small text-uppercase mb-2">Mật khẩu hiện tại</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-lock text-muted opacity-50"></i></span>
                    <input type="password" name="old_password" class="form-control border-start-0" placeholder="••••••••" required style="height: 50px;">
                    <button class="btn btn-light border toggle-password" type="button" style="border-radius: 0 12px 12px 0;">
                        <i class="fa-solid fa-eye-slash text-muted"></i>
                    </button>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold text-muted small text-uppercase mb-2">Mật khẩu mới</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-shield-halved text-muted opacity-50"></i></span>
                    <input type="password" name="new_password" id="new_pw" class="form-control border-start-0" placeholder="Ít nhất 8 ký tự" required minlength="8" 
                           pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$" 
                           title="Ít nhất 8 ký tự, gồm chữ hoa, thường, số và ký tự đặc biệt." style="height: 50px;">
                    <button class="btn btn-light border toggle-password" type="button" style="border-radius: 0 12px 12px 0;">
                        <i class="fa-solid fa-eye-slash text-muted"></i>
                    </button>
                </div>
                <div class="form-text mt-2 tiny text-muted">Mật khẩu cần có chữ hoa, chữ thường, số và ký tự đặc biệt.</div>
            </div>

            <div class="mt-5">
                <button type="submit" class="btn-mobile btn-mobile-primary shadow">
                    <i class="fa-solid fa-shield-check"></i> LƯU THAY ĐỔI
                </button>
                <a href="/" class="btn btn-link w-100 mt-3 text-muted text-decoration-none small fw-bold">Để sau, quay lại trang chủ</a>
            </div>
        </form>
    </div>
</div>

<style>
    .input-group .form-control:focus {
        border-color: var(--primary);
        box-shadow: none;
        background: white;
    }
    .input-group .input-group-text { border-right: none; }
    .form-control { border-radius: 12px; font-size: 15px; }
</style>

<script>
document.querySelectorAll('.toggle-password').forEach(btn => {
    btn.addEventListener('click', () => {
        const input = btn.parentElement.querySelector('input');
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        }
    });
});
</script>
{% endblock %}
