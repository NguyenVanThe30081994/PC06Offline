{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center animate__animated animate__fadeIn">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden mt-5">
            <div class="card-header bg-primary text-white p-4 text-center border-0">
                <i class="fa-solid fa-key fs-1 mb-3 opacity-75"></i>
                <h4 class="fw-bold mb-0">Thay đổi mật khẩu</h4>
                <p class="text-white-50 small mb-0 mt-1">Để bảo mật thông tin, vui lòng cập nhật mật khẩu của bạn.</p>
            </div>
            <div class="card-body p-4 p-lg-5 bg-white">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark small">MẬT KHẨU HIỆN TẠI</label>
                        <div class="input-group shadow-sm border rounded-3 overflow-hidden">
                            <span class="input-group-text bg-light border-0"><i class="fa-solid fa-lock-open text-muted"></i></span>
                            <input type="password" name="old_password" class="form-control border-0 py-2" placeholder="Nhập mật khẩu cũ" autocomplete="current-password" required>
                            <button class="btn btn-light border-0 px-3 toggle-password" type="button"><i class="fa-solid fa-eye-slash text-muted"></i></button>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark small">MẬT KHẨU MỚI</label>
                        <div class="input-group shadow-sm border rounded-3 overflow-hidden">
                            <span class="input-group-text bg-light border-0"><i class="fa-solid fa-lock text-primary"></i></span>
                            <input type="password" name="new_password" id="new_pw" class="form-control border-0 py-2" placeholder="Nhập mật khẩu mới" autocomplete="new-password" required minlength="8" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$" title="Mật khẩu phải có ít nhất 8 ký tự, bao gồm chữ hoa, chữ thường, số và ký tự đặc biệt (@$!%*?&).">
                            <button class="btn btn-light border-0 px-3 toggle-password" type="button"><i class="fa-solid fa-eye-slash text-muted"></i></button>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-5">
                        <button type="submit" class="btn btn-primary py-3 rounded-3 fw-bold shadow-sm">
                            <i class="fa-solid fa-shield-check me-2"></i>CẬP NHẬT MẬT KHẨU
                        </button>
                        <a href="{{ url_for('admin_bp.index') }}" class="btn btn-link text-muted text-decoration-none small">Để sau, quay lại trang chủ</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .input-group:focus-within {
        border-color: var(--bs-primary) !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15) !important;
    }
    .form-control:focus {
        box-shadow: none;
    }
</style>

<script>
document.querySelectorAll('.toggle-password').forEach(btn => {
    btn.addEventListener('click', () => {
        const input = btn.parentElement.querySelector('input');
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        }
    });
});
</script>
{% endblock %}
