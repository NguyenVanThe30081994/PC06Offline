{% extends "base.html" %}

{% block content %}
<div class="page-header mb-4 animate__animated animate__fadeIn">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
        <!-- Hybrid-Next Breadcrumb Flow -->
        <div class="d-flex align-items-center gap-3">
            <div class="glass-panel p-2 rounded-4 shadow-sm" style="background: var(--primary-gradient);">
                <i class="fa-solid fa-key text-white fs-5"></i>
            </div>
            <nav class="breadcrumb-nav glass-panel d-none d-lg-flex px-3 py-2 rounded-pill">
                <span class="segment fw-bold text-dark">TÀI KHOẢN</span>
                <div class="picker-chip glass-panel active shadow-sm" style="background: white;">
                    THAY ĐỔI MẬT KHẨU
                </div>
            </nav>
            <h1 class="h4 fw-bold text-dark mb-0 d-lg-none">Mật khẩu</h1>
        </div>
    </div>
</div>

<div class="row justify-content-center animate__animated animate__fadeInUp">
    <div class="col-xl-5 col-lg-6">
        <div class="bento-card p-4 p-md-5">
            <div class="mb-5 border-bottom pb-4 text-center">
                <div class="badge bg-primary bg-opacity-10 text-primary rounded-pill mb-3 px-3 fw-bold tiny letter-spacing-1">AN NINH HỆ THỐNG</div>
                <h3 class="fw-bold text-dark mb-0">Cập nhật Mật khẩu</h3>
            </div>

            <form method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold text-muted small text-uppercase letter-spacing-1">Mật khẩu hiện tại</label>
                    <div class="input-group">
                        <input type="password" name="old_password" class="form-control" placeholder="••••••••" autocomplete="current-password" required style="border-top-right-radius: 0; border-bottom-right-radius: 0;">
                        <button class="btn btn-light border px-3 toggle-password" type="button" style="border-top-right-radius: 16px; border-bottom-right-radius: 16px;">
                            <i class="fa-solid fa-eye-slash text-muted"></i>
                        </button>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold text-muted small text-uppercase letter-spacing-1">Mật khẩu mới</label>
                    <div class="input-group">
                        <input type="password" name="new_password" id="new_pw" class="form-control" placeholder="Nhập mật khẩu mới" autocomplete="new-password" required minlength="8" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$" title="Mật khẩu phải có ít nhất 8 ký tự, bao gồm chữ hoa, chữ thường, số và ký tự đặc biệt (@$!%*?&)." style="border-top-right-radius: 0; border-bottom-right-radius: 0;">
                        <button class="btn btn-light border px-3 toggle-password" type="button" style="border-top-right-radius: 16px; border-bottom-right-radius: 16px;">
                            <i class="fa-solid fa-eye-slash text-muted"></i>
                        </button>
                    </div>
                </div>

                <div class="d-grid gap-3 mt-5">
                    <button type="submit" class="btn btn-primary py-3 rounded-4 fw-bold shadow-sm">
                        <i class="fa-solid fa-shield-check me-2"></i>LƯU THAY ĐỔI
                    </button>
                    <a href="{{ url_for('admin_bp.index') }}" class="btn btn-link text-muted text-decoration-none small text-center fw-bold">Để sau, quay lại trang chủ</a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .input-group:focus-within {
        border-color: var(--bs-primary) !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15) !important;
    }
    .form-control:focus {
        box-shadow: none;
    }
</style>

<script>
document.querySelectorAll('.toggle-password').forEach(btn => {
    btn.addEventListener('click', () => {
        const input = btn.parentElement.querySelector('input');
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        }
    });
});
</script>
{% endblock %}
