{% extends "bdhv_base.html" %}

{% block bdhv_content %}
<div class="page-header mb-4 animate__animated animate__fadeIn">
    <div class="header-main-group">
        <div class="header-title-pill shadow-sm">
            <i class="fa-solid fa-user-plus"></i>
            <h1 class="mb-0">Đăng ký học viên mới</h1>
        </div>
        <div class="header-actions">
            <a href="/bdhv" class="btn btn-outline-secondary rounded-pill px-4">
                <i class="fa-solid fa-arrow-left me-2"></i>QUAY LẠI
            </a>
        </div>
    </div>
</div>

<div class="row g-4 animate__animated animate__fadeInUp">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header border-0 bg-white py-3">
                <h5 class="fw-bold mb-0">Thông tin học viên</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và tên</label>
                        <input type="text" name="ho_ten" class="form-control" placeholder="Nhập họ và tên đầy đủ" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Số CCCD/Căn cước</label>
                        <input type="text" name="cccd" class="form-control" placeholder="Nhập số CCCD (12 số)" required pattern="[0-9]{12}" maxlength="12">
                        <div class="form-text">Nhập 12 số CCCD hoặc Căn cước công dân</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Đơn vị (xã/phường)</label>
                        <select name="don_vi" class="form-select" required>
                            <option value="">-- Chọn đơn vị --</option>
                            {% for dv in don_vi_list %}
                            <option value="{{ dv.ten_don_vi }}">{{ dv.ten_don_vi }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary rounded-pill px-4">
                        <i class="fa-solid fa-save me-2"></i>ĐĂNG KÝ
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-lg-4">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header border-0 bg-white py-3">
                <h6 class="fw-bold mb-0">Lưu ý</h6>
            </div>
            <div class="card-body">
                <ul class="mb-0">
                    <li class="mb-2">Mỗi CCCD chỉ đăng ký một lần</li>
                    <li class="mb-2">Thông tin phải chính xác theo CCCD</li>
                    <li class="mb-0">Chọn đơn vị xã/phường nơi cư trú</li>
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock bdhv_content %}
