{% extends "base.html" %}

{% block content %}
<div class="page-header mb-4 animate__animated animate__fadeIn">
    <div class="header-main-group">
        <div class="header-title-pill shadow-sm">
            <i class="fa-solid fa-microchip"></i>
            <h1 class="mb-0">Thiết lập Biểu mẫu V2</h1>
        </div>

        <div class="header-actions">
            {% if is_admin %}
            <button class="btn btn-primary rounded-pill px-4 fw-bold shadow" data-bs-toggle="modal" data-bs-target="#uploadV2Modal">
                <i class="fa-solid fa-plus me-2"></i>TẠO MẪU V2 MỚI
            </button>
            {% endif %}
        </div>
    </div>
</div>

<div class="main-content-area animate__animated animate__fadeInUp">
    <!-- Unified Filter Hub -->
    <div class="filter-bar-unified animate__animated animate__fadeInUp mb-4">
        <div class="search-box-modern w-100">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="v2Search" placeholder="Tìm tên biểu mẫu V2..." onkeyup="unifiedFilter()">
        </div>
    </div>

    <div class="row g-3">
        {% for t in templates %}
        <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 template-item">
            <div class="card compact-admin-card shadow-sm h-100 border-0">
                <div class="card-body p-3 d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="badge bg-indigo-light text-indigo tiny fw-bold">V2</span>
                        <div class="admin-actions d-flex gap-1">
                            <a href="{{ url_for('reports_v2_bp.edit_template', tid=t.id) }}" class="btn btn-tiny btn-light shadow-sm" title="Thiết lập mẫu">
                                <i class="fa-solid fa-gear text-primary"></i>
                            </a>
                            <button class="btn btn-tiny btn-light shadow-sm" title="Xóa mẫu" onclick="ModernConfirm('Xác nhận xóa?', 'Xóa mẫu v2 này sẽ không thể khôi phục. Tiếp tục?', 'warning', 'Xóa ngay', () => { 
                                const form = document.createElement('form');
                                form.method = 'POST';
                                form.action = '{{ url_for('reports_v2_bp.delete_template', tid=t.id) }}';
                                document.body.appendChild(form);
                                form.submit();
                            })">
                                <i class="fa-solid fa-trash-can text-danger"></i>
                            </button>
                        </div>
                    </div>
                    
                    <h6 class="fw-bold text-dark mb-2 line-clamp-2" style="font-size: 0.9rem; min-height: 2.7rem;" title="{{ t.name }}">
                        {{ t.name }}
                    </h6>

                    <div class="tiny text-muted mb-3">
                        <i class="fa-solid fa-calendar-day me-1"></i>{% if t.is_daily %}Hàng ngày{% else %}Định kỳ{% endif %}
                    </div>

                    <div class="mt-auto">
                        <a href="{{ url_for('forms_bp.stats', rid=t.id, v2=1, form_type='v2') }}" class="btn btn-primary w-100 rounded-pill tiny fw-bold py-2 shadow-sm">
                            DỮ LIỆU
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<!-- Upload V2 Modal -->
<div class="modal fade" id="uploadV2Modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
            <form action="{{ url_for('reports_v2_bp.upload_v2') }}" method="POST" enctype="multipart/form-data">
                <div class="modal-header bg-primary text-white p-4 border-0">
                    <h5 class="modal-title fw-bold">TẠO MẪU BIỂU MẪU V2 MỚI</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark small">TÊN BIỂU MẪU (V2)</label>
                        <input type="text" name="name" class="form-control" placeholder="Ví dụ: Báo cáo cao điểm tấn công tội phạm" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark small">FILE EXCEL MẪU (.xlsx)</label>
                        <input type="file" name="file" class="form-control" accept=".xlsx" required>
                    </div>
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input" type="checkbox" name="is_daily" id="isDailySwitch">
                        <label class="form-check-label fw-bold text-muted small" for="isDailySwitch">Báo cáo hàng ngày</label>
                    </div>
                </div>
                <div class="modal-footer bg-light border-0">
                    <button type="button" class="btn btn-light border rounded-pill px-4 fw-bold" data-bs-dismiss="modal">HỦY</button>
                    <button type="submit" class="btn btn-primary px-5 rounded-pill fw-bold shadow">TẢI LÊN & KHỞI TẠO</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .compact-admin-card { transition: transform 0.2s; background: #fff; border-radius: 12px; }
    .compact-admin-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05) !important; }
    .btn-tiny { width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 6px; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tiny { font-size: 11px; }
    .bg-indigo-light { background-color: #eef2ff; }
    .text-indigo { color: #4f46e5; }
</style>

<script>
    function unifiedFilter() {
        const query = document.getElementById('v2Search').value.toLowerCase();
        document.querySelectorAll('.template-item').forEach(el => {
            const title = el.querySelector('h6').innerText.toLowerCase();
            el.style.display = title.includes(query) ? 'block' : 'none';
        });
    }
</script>
{% endblock %}
