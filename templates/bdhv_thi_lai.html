{% extends "bdhv_base.html" %}

{% block bdhv_content %}
<div class="page-header mb-4 animate__animated animate__fadeIn">
    <div class="header-main-group">
        <div class="header-title-pill shadow-sm">
            <i class="fa-solid fa-rotate-left"></i>
            <h1 class="mb-0">Đăng ký thi lại</h1>
        </div>
        <div class="header-actions">
            <a href="/bdhv" class="btn btn-outline-secondary rounded-pill px-4">
                <i class="fa-solid fa-arrow-left me-2"></i>QUAY LẠI
            </a>
        </div>
    </div>
</div>

<div class="row g-4 animate__animated animate__fadeInUp">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header border-0 bg-white py-3">
                <h5 class="fw-bold mb-0">Đăng ký thi lại</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và tên</label>
                        <input type="text" name="ho_ten" class="form-control" placeholder="Nhập họ và tên" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Số CCCD/Căn cước</label>
                        <input type="text" name="cccd" class="form-control" placeholder="Nhập số CCCD (12 số)" required pattern="[0-9]{12}" maxlength="12">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Đơn vị (xã/phường)</label>
                        <select name="don_vi" class="form-select" required>
                            <option value="">-- Chọn đơn vị --</option>
                            {% for dv in don_vi_list %}
                            <option value="{{ dv.ten_don_vi }}">{{ dv.ten_don_vi }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Lý do thi lại</label>
                        <textarea name="ly_do" class="form-control" rows="3" placeholder="Nêu rõ lý do cần thi lại..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-warning rounded-pill px-4">
                        <i class="fa-solid fa-save me-2"></i>ĐĂNG KÝ THI LẠI
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-lg-4">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header border-0 bg-white py-3">
                <h6 class="fw-bold mb-0">Thông tin</h6>
            </div>
            <div class="card-body">
                <p class="mb-2">Sau khi đăng ký, bạn sẽ được thi lại vào ngày tiếp theo.</p>
                <p class="mb-0 text-muted">Thời gian thi lại sẽ được thông báo qua tin nhắn.</p>
            </div>
        </div>
    </div>
</div>
{% endblock bdhv_content %}
