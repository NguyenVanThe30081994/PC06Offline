{% extends "base.html" %}

{% block content %}
<div class="page-header mb-4">
    <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
            <a href="{{ url_for('excel_builder_bp.dashboard') }}" class="btn btn-light rounded-pill">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <h1 class="h3 fw-bold text-dark mb-1">Chỉnh sửa biểu mẫu</h1>
                <p class="text-muted small mb-0">Click vào ô để nhập header</p>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-primary rounded-pill px-4" onclick="addRow()">
                <i class="fa-solid fa-plus me-1"></i> Dòng
            </button>
            <button class="btn btn-outline-primary rounded-pill px-4" onclick="addColumn()">
                <i class="fa-solid fa-plus me-1"></i> Cột
            </button>
        </div>
    </div>
</div>

<!-- Toolbar -->
<div class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body py-3">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary rounded-pill" onclick="mergeCells()" title="Gộp ô">
                    <i class="fa-solid fa-object-group"></i>
                </button>
                <button class="btn btn-outline-secondary rounded-pill" onclick="unmergeCells()" title="Bỏ gộp">
                    <i class="fa-solid fa-object-ungroup"></i>
                </button>
                <div class="vr mx-2"></div>
                <select class="form-select form-select-sm rounded-pill" id="columnType" onchange="setColumnType()">
                    <option value="">-- Kiểu cột --</option>
                    <option value="number">Số</option>
                    <option value="text">Văn bản</option>
                    <option value="percent">Phần trăm %</option>
                    <option value="formula">Công thức</option>
                </select>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-danger rounded-pill" onclick="previewGrid()">
                    <i class="fa-solid fa-eye me-1"></i> Xem trước
                </button>
                <button class="btn btn-success rounded-pill px-4" onclick="saveAndExport()">
                    <i class="fa-solid fa-download me-1"></i> Lưu & Xuất
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Grid Editor -->
<div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-bordered mb-0 excel-grid" id="gridTable">
                <!-- Grid will be generated by JavaScript -->
            </table>
        </div>
    </div>
</div>

<!-- Hidden form for save -->
<form id="saveForm" method="POST" action="{{ url_for('excel_builder_bp.save_template') }}">
    <input type="hidden" name="grid_data" id="gridDataInput">
    <input type="hidden" name="template_id" id="templateIdInput" value="{{ template_id or '' }}">
</form>

<script>
let gridData = {{ grid_data | tojson }};
let selectedCells = [];

// Initialize grid
function initGrid() {
    const rows = gridData.rows || 10;
    const cols = gridData.cols || 8;
    const headers = gridData.headers || {};
    
    let html = '';
    
    // Header area (first 3 rows highlighted)
    for (let r = 1; r <= Math.min(3, rows); r++) {
        html += '<tr class="header-row">';
        html += `<td class="row-num bg-light">${r}</td>`;
        for (let c = 1; c <= cols; c++) {
            const colLetter = String.fromCharCode(64 + c);
            const cellKey = `${r}_${colLetter}`;
            const value = headers[cellKey] || '';
            const isHeader = r === 1 || r === 2 ? 'bg-primary bg-opacity-10 fw-bold' : '';
            
            html += `<td class="cell ${isHeader}" contenteditable="true" 
                        data-cell="${cellKey}"
                        data-col="${colLetter}"
                        onclick="selectCell(this)"
                        onblur="saveCell(this)">${value}</td>`;
        }
        html += '</tr>';
    }
    
    // Data rows
    for (let r = 4; r <= rows; r++) {
        html += '<tr>';
        html += `<td class="row-num bg-light">${r}</td>`;
        for (let c = 1; c <= cols; c++) {
            const colLetter = String.fromCharCode(64 + c);
            const cellKey = `${r}_${colLetter}`;
            const value = headers[cellKey] || '';
            
            html += `<td class="cell" contenteditable="true" 
                        data-cell="${cellKey}"
                        data-col="${colLetter}"
                        onclick="selectCell(this)"
                        onblur="saveCell(this)">${value}</td>`;
        }
        html += '</tr>';
    }
    
    document.getElementById('gridTable').innerHTML = html;
}

// Save cell value on blur
function saveCell(cell) {
    const cellKey = cell.dataset.cell;
    const value = cell.innerText.trim();
    
    if (value) {
        gridData.headers[cellKey] = value;
    } else {
        delete gridData.headers[cellKey];
    }
}

// Cell selection
function selectCell(cell) {
    document.querySelectorAll('.cell.selected').forEach(c => c.classList.remove('selected'));
    cell.classList.add('selected');
    
    const col = cell.dataset.col;
    if (col) {
        document.getElementById('columnType').value = gridData.column_types[col] || '';
    }
}

// Set column type
function setColumnType() {
    const col = document.querySelector('.cell.selected')?.dataset.col;
    if (col) {
        gridData.column_types[col] = document.getElementById('columnType').value;
    }
}

// Add row
function addRow() {
    gridData.rows++;
    initGrid();
}

// Add column
function addColumn() {
    gridData.cols++;
    initGrid();
}

// Merge cells (simple - merge current selection horizontally)
function mergeCells() {
    const selected = document.querySelectorAll('.cell.selected');
    if (selected.length < 2) {
        alert('Chọn nhiều ô để gộp');
        return;
    }
    
    const firstCell = selected[0].dataset.cell;
    const lastCell = selected[selected.length - 1].dataset.cell;
    const mergeRange = `${firstCell}:${lastCell}`;
    
    if (!gridData.merges) gridData.merges = [];
    gridData.merges.push(mergeRange);
    
    alert(`Đã gộp: ${mergeRange}`);
}

// Unmerge cells
function unmergeCells() {
    gridData.merges = [];
    alert('Đã bỏ gộp tất cả');
}

// Save and export
function saveAndExport() {
    document.getElementById('gridDataInput').value = JSON.stringify(gridData);
    
    // Submit and get download
    fetch('{{ url_for("excel_builder_bp.save_template") }}', {
        method: 'POST',
        body: new FormData(document.getElementById('saveForm'))
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === 'success') {
            // Download
            window.location.href = '/admin/excel-builder/export/' + data.template_id;
        } else {
            alert('Lỗi: ' + data.error);
        }
    });
}

// Preview
function previewGrid() {
    document.getElementById('gridDataInput').value = JSON.stringify(gridData);
    
    fetch('{{ url_for("excel_builder_bp.preview_template") }}?' + new URLSearchParams({
        grid_data: JSON.stringify(gridData)
    }))
    .then(r => r.json())
    .then(data => {
        const modal = `
        <div class="modal fade" id="previewModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Xem trước</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        ${data.html}
                    </div>
                </div>
            </div>
        </div>`;
        
        document.body.insertAdjacentHTML('beforeend', modal);
        new bootstrap.Modal(document.getElementById('previewModal')).show();
    });
}

// Initialize on load
document.addEventListener('DOMContentLoaded', initGrid);
</script>

<style>
.excel-grid .cell {
    min-width: 100px;
    min-height: 30px;
    padding: 8px 12px;
    cursor: text;
}
.excel-grid .cell:focus {
    outline: 2px solid var(--bs-primary);
    background: var(--bs-primary-bg-subtle);
}
.excel-grid .cell.selected {
    outline: 2px solid var(--bs-primary);
    background: var(--bs-primary-bg-subtle);
}
.excel-grid .header-row .cell {
    background: var(--bs-primary-bg-subtle);
    font-weight: 600;
}
.excel-grid .row-num {
    width: 50px;
    text-align: center;
    font-weight: 600;
    user-select: none;
}
</style>
{% endblock %}
