{% extends "base.html" %}

{% block extra_head %}
<style>
/* 1. Root Variables cho Glassmorphism */
:root {
    --glass-bg: rgba(255, 255, 255, 0.45);
    --glass-border: rgba(255, 255, 255, 0.3);
    --glass-shadow: rgba(31, 38, 135, 0.1);
    --primary-gradient: linear-gradient(135deg, #0066FF, #0099FF);
}

/* 2. Sidebar Main Container */
.bdhv-sidebar {
    min-height: calc(100vh - 100px);
    position: sticky;
    top: 85px;
    padding: 24px 16px;
    z-index: 100;
    margin-left: 15px; /* Tạo khoảng cách để sidebar trông như đang "lơ lửng" */
    
    /* Hiệu ứng Kính mờ */
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    
    /* Bo góc và Viền mảnh */
    border-radius: 24px;
    border: 1px solid var(--glass-border);
    box-shadow: 0 8px 32px 0 var(--glass-shadow);
    
    transition: all 0.3s ease;
}

/* 3. Header tinh tế hơn */
.bdhv-header {
    text-align: center;
    padding-bottom: 24px;
    margin-bottom: 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

.bdhv-header .badge {
    font-size: 15px;
    padding: 10px 20px;
    border-radius: 50px;
    background: var(--primary-gradient);
    border: none;
    box-shadow: 0 10px 20px rgba(0, 102, 255, 0.2);
}

.bdhv-header .sub {
    font-size: 11px;
    color: #64748b;
    margin-top: 10px;
    font-weight: 700;
    letter-spacing: 2px;
}

/* 4. Menu Items (Pills) */
.bdhv-nav {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.bdhv-pill {
    padding: 12px 18px;
    color: #475569;
    font-weight: 500;
    font-size: 14px;
    text-decoration: none;
    border-radius: 16px;
    display: flex;
    align-items: center;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid transparent;
}

.bdhv-pill i {
    width: 24px;
    font-size: 16px;
    margin-right: 12px;
    opacity: 0.8;
}

/* Hover Effect */
.bdhv-pill:hover {
    background: rgba(255, 255, 255, 0.5);
    color: #0066FF;
    transform: translateX(8px);
    border: 1px solid rgba(255, 255, 255, 0.5);
}

/* Active State */
.bdhv-pill.active {
    background: var(--primary-gradient);
    color: #ffffff !important;
    font-weight: 600;
    box-shadow: 0 10px 25px rgba(0, 102, 255, 0.3);
    transform: translateX(5px);
}

.bdhv-pill.active i {
    opacity: 1;
    transform: scale(1.1);
}

/* 5. Labels (macOS Style) */
.bdhv-label {
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #94a3b8;
    margin: 25px 0 10px 15px;
}

/* Layout Adjustment */
.bdhv-main-content {
    padding: 30px;
    min-height: calc(100vh - 80px);
}
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row g-4">
        <div class="col-lg-2 d-none d-lg-block">
            <div class="bdhv-sidebar">
                <div class="bdhv-header">
                    <span class="badge">
                        <i class="fa-solid fa-graduation-cap"></i> BDHV
                    </span>
                    <div class="sub">BÌNH DÂN HỌC VỤ</div>
                </div>
                
                <nav class="bdhv-nav">
                    <a href="/bdhv" class="bdhv-pill {% if request.endpoint == 'bdhv_bp.index' %}active{% endif %}">
                        <i class="fa-solid fa-house"></i>Trang chủ
                    </a>
                    
                    <div class="bdhv-label">Tra cứu</div>
                    <a href="/bdhv/tra-cuu" class="bdhv-pill {% if request.endpoint == 'bdhv_bp.tra_cuu' %}active{% endif %}">
                        <i class="fa-solid fa-id-card"></i>Theo CCCD
                    </a>
                    <a href="/bdhv/tra-cuu-don-vi" class="bdhv-pill {% if request.endpoint == 'bdhv_bp.tra_cuu_don_vi' %}active{% endif %}">
                        <i class="fa-solid fa-building-circle-check"></i>Theo đơn vị
                    </a>
                    
                    <div class="bdhv-label">Đăng ký</div>
                    <a href="/bdhv/dang-ky" class="bdhv-pill {% if request.endpoint == 'bdhv_bp.dang_ky' %}active{% endif %}">
                        <i class="fa-solid fa-user-plus"></i>Đăng ký mới
                    </a>
                    <a href="/bdhv/thi-lai" class="bdhv-pill {% if request.endpoint == 'bdhv_bp.thi_lai' %}active{% endif %}">
                        <i class="fa-solid fa-rotate-left"></i>Thi lại
                    </a>
                    
                    <div class="bdhv-label">Báo cáo</div>
                    <a href="/bdhv/thong-ke" class="bdhv-pill {% if request.endpoint == 'bdhv_bp.thong_ke' %}active{% endif %}">
                        <i class="fa-solid fa-chart-line"></i>Thống kê
                    </a>
                    <a href="/bdhv/xep-hang" class="bdhv-pill {% if request.endpoint == 'bdhv_bp.xep_hang' %}active{% endif %}">
                        <i class="fa-solid fa-crown"></i>Xếp hạng
                    </a>
                </nav>
            </div>
        </div>
        
        <div class="col-lg-10">
            <div class="bdhv-main-content">
                {% block bdhv_content %}{% endblock %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
