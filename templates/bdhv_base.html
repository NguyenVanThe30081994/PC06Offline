{% extends "base.html" %}

{% block extra_head %}
<style>
.bdhv-sidebar {
    min-height: calc(100vh - 120px);
    background: var(--bs-body-bg);
    border-right: 1px solid rgba(0,0,0,0.08);
}
{% if session.get('theme') == 'dark' %}
.bdhv-sidebar {
    background: #1a1a2e;
}
{% endif %}
.bdhv-menu-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-radius: 8px;
    color: var(--bs-body-color);
    text-decoration: none;
    transition: all 0.2s ease;
    margin-bottom: 4px;
    font-weight: 500;
}
.bdhv-menu-item:hover {
    background: rgba(0,102,255,0.08);
    color: var(--primary);
}
.bdhv-menu-item.active {
    background: var(--primary);
    color: white;
}
.bdhv-menu-item i {
    width: 24px;
    margin-right: 12px;
    font-size: 16px;
}
.bdhv-main-content {
    padding: 20px;
    min-height: calc(100vh - 120px);
}
</style>
{% endblock %}

{% block content %}
<div class="row g-0">
    <!-- Sidebar -->
    <div class="col-lg-2 bdhv-sidebar d-none d-lg-block">
        <div class="p-3">
            <div class="mb-3 px-2 tiny fw-bold text-uppercase" style="letter-spacing: 1px; color: var(--text-muted);">
                <i class="fa-solid fa-school me-2"></i>BDHV
            </div>
            <div class="nav flex-column">
                <a href="/bdhv" class="bdhv-menu-item {% if request.endpoint == 'bdhv_bp.index' %}active{% endif %}">
                    <i class="fa-solid fa-house"></i>Trang chủ
                </a>
                <div class="mb-2 px-2 tiny fw-bold text-uppercase mt-3" style="letter-spacing: 1px; color: var(--text-muted);">
                    Tra cứu
                </div>
                <a href="/bdhv/tra-cuu" class="bdhv-menu-item {% if request.endpoint == 'bdhv_bp.tra_cuu' %}active{% endif %}">
                    <i class="fa-solid fa-id-card"></i>Theo CCCD
                </a>
                <a href="/bdhv/tra-cuu-don-vi" class="bdhv-menu-item {% if request.endpoint == 'bdhv_bp.tra_cuu_don_vi' %}active{% endif %}">
                    <i class="fa-solid fa-building"></i>Theo đơn vị
                </a>
                <div class="mb-2 px-2 tiny fw-bold text-uppercase mt-3" style="letter-spacing: 1px; color: var(--text-muted);">
                    Đăng ký
                </div>
                <a href="/bdhv/dang-ky" class="bdhv-menu-item {% if request.endpoint == 'bdhv_bp.dang_ky' %}active{% endif %}">
                    <i class="fa-solid fa-user-plus"></i>Đăng ký mới
                </a>
                <a href="/bdhv/thi-lai" class="bdhv-menu-item {% if request.endpoint == 'bdhv_bp.thi_lai' %}active{% endif %}">
                    <i class="fa-solid fa-rotate-left"></i>Thi lại
                </a>
                <a href="/bdhv/phuc-tra" class="bdhv-menu-item {% if request.endpoint == 'bdhv_bp.phuc_tra' %}active{% endif %}">
                    <i class="fa-solid fa-file-signature"></i>Phúc tra
                </a>
                <div class="mb-2 px-2 tiny fw-bold text-uppercase mt-3" style="letter-spacing: 1px; color: var(--text-muted);">
                    Báo cáo
                </div>
                <a href="/bdhv/thong-ke" class="bdhv-menu-item {% if request.endpoint == 'bdhv_bp.thong_ke' %}active{% endif %}">
                    <i class="fa-solid fa-chart-bar"></i>Thống kê
                </a>
                <a href="/bdhv/xep-hang" class="bdhv-menu-item {% if request.endpoint == 'bdhv_bp.xep_hang' %}active{% endif %}">
                    <i class="fa-solid fa-trophy"></i>Xếp hạng
                </a>
                <hr class="my-3 opacity-10">
                <a href="/bdhv/export/danh-sach" class="bdhv-menu-item">
                    <i class="fa-solid fa-file-excel"></i>Xuất DS HV
                </a>
                <a href="/bdhv/export/thong-ke" class="bdhv-menu-item">
                    <i class="fa-solid fa-file-csv"></i>Xuất thống kê
                </a>
            </div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="col-lg-10 bdhv-main-content">
        {% block bdhv_content %}{% endblock %}
    </div>
</div>
{% endblock %}
