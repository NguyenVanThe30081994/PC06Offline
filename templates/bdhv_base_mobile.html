{% extends "base_mobile.html" %}

{% block title %}Bình Dân Học Vụ - PC06 Mobile{% endblock %}

{% block head %}
<style>
/* BDHV Mobile - Clean Mobile Design */
.bdhv-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
}

.bdhv-card-header {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 8px;
}

.bdhv-stat {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
}

.bdhv-stat-label {
    font-size: 12px;
    color: var(--text-muted);
}

.bdhv-menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    color: var(--text-main);
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
}

.bdhv-menu-item:active {
    transform: scale(0.98);
}

.bdhv-menu-item i:first-child {
    font-size: 20px;
    width: 28px;
    text-align: center;
}

.bdhv-menu-item .ms-auto {
    color: var(--text-muted);
}

/* Quick Actions Grid */
.bdhv-quick-actions {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 16px 0;
}

.bdhv-quick-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 12px 8px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-main);
    font-size: 11px;
    font-weight: 600;
    text-decoration: none;
}

.bdhv-quick-btn i {
    font-size: 22px;
    color: var(--primary);
}

/* Form Styles */
.bdhv-form-group {
    margin-bottom: 16px;
}

.bdhv-form-label {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 8px;
    display: block;
    color: var(--text-main);
}

.bdhv-form-input, .bdhv-form-select {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg-surface);
    color: var(--text-main);
    font-size: 14px;
}

.bdhv-btn {
    padding: 14px 24px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    border: none;
    width: 100%;
}

.bdhv-btn-primary {
    background: var(--primary);
    color: #fff;
}

.bdhv-btn-secondary {
    background: var(--bg-surface);
    color: var(--text-main);
    border: 1px solid var(--border);
}

/* Table */
.bdhv-table {
    width: 100%;
    border-collapse: collapse;
}

.bdhv-table th {
    padding: 12px;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    background: var(--bg-body);
}

.bdhv-table td {
    padding: 14px 12px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
}

/* Page Header */
.bdhv-page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
}

.bdhv-page-title {
    font-size: 18px;
    font-weight: 700;
    margin: 0;
}
</style>
{% endblock %}

{% block content %}
<div class="animate__animated animate__fadeIn">
    {% block bdhv_content %}{% endblock %}
</div>
{% endblock %}
