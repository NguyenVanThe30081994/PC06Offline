{% extends "base_mobile.html" %}

{% block title %}Đăng nhập PC06 Mobile{% endblock %}

{% block head %}
<style>
    body { background: var(--bg-surface); }
    .main-content { padding-top: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
    .login-logo { width: 80px; height: 80px; margin-bottom: 24px; }
    .login-title { font-size: 24px; font-weight: 800; color: var(--text-main); margin-bottom: 8px; letter-spacing: -1px; }
    .login-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 40px; }
    .form-floating > .form-control:focus ~ label, .form-floating > .form-control:not(:placeholder-shown) ~ label { transform: scale(0.85) translateY(-0.5rem) translateX(0.15rem); color: var(--primary); }
    .form-control { border-radius: 12px; border: 1.5px solid var(--border); padding: 12px 16px; height: 58px; font-weight: 500; font-size: 16px; }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }
    .input-group-text { background: transparent; border: none; padding-right: 0; color: var(--text-muted); }
    .btn-login { background: var(--primary); color: white; border: none; height: 56px; border-radius: 14px; font-size: 16px; font-weight: 700; width: 100%; margin-top: 20px; transition: all 0.2s; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2); }
    .btn-login:active { transform: scale(0.98); opacity: 0.9; }
    .footer-text { margin-top: 40px; font-size: 12px; color: var(--text-muted); }
</style>
{% endblock %}

{% block content %}
<div class="login-box animate__animated animate__fadeIn">
    <div class="d-flex justify-content-center">
        <div class="login-logo d-flex align-items-center justify-content-center bg-primary rounded-4 text-white shadow-lg mb-4">
            <i class="fa-solid fa-shield-halved fs-1"></i>
        </div>
    </div>
    <h1 class="login-title">PC06 TỔNG HỢP</h1>
    <p class="login-subtitle">Chào mừng bạn quay trở lại hệ thống</p>

    <form method="POST">
        <div class="form-floating mb-3 text-start">
            <input type="text" name="username" class="form-control" id="uInput" placeholder="Tên đăng nhập" required autofocus>
            <label for="uInput" class="fw-medium small"><i class="fa-solid fa-user me-2"></i>Tên đăng nhập</label>
        </div>
        
        <div class="form-floating mb-4 text-start">
            <input type="password" name="password" class="form-control" id="pInput" placeholder="Mật khẩu" required>
            <label for="pInput" class="fw-medium small"><i class="fa-solid fa-lock me-2"></i>Mật khẩu</label>
        </div>

        <button type="submit" class="btn-login">ĐĂNG NHẬP NGAY</button>
    </form>

    <div class="footer-text">
        <p>&copy; 2026 PC06. Đã tối ưu cho thiết bị di động.</p>
    </div>
</div>
{% endblock %}
