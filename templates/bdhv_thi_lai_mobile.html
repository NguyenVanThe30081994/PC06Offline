{% extends "base_mobile.html" %}

{% block title %}Thi lại - BDHV{% endblock %}

{% block content %}
<div class="animate__animated animate__fadeIn">
    <h1 class="h5 fw-bold mb-3">Đăng ký thi lại</h1>
    
    <form method="POST" action="/bdhv/thi-lai">
        <div class="mb-3">
            <label class="form-label fw-bold">Họ tên</label>
            <input type="text" name="ho_ten" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">CCCD</label>
            <input type="text" name="cccd" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">Đơn vị</label>
            <select name="don_vi" class="form-select" required>
                <option value="">-- Chọn đơn vị --</option>
                {% for dv in don_vi_list %}
                <option value="{{ dv.ten_don_vi }}">{{ dv.ten_don_vi }}</option>
                {% endfor %}
            </select>
        </div>
        
        <button type="submit" class="btn btn-warning w-100 rounded-4">Đăng ký thi lại</button>
    </form>
</div>
{% endblock %}
