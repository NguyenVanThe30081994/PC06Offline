{% extends "base.html" %}
{% block content %}
<div class="container text-center py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="error-illustration mb-4">
                <i class="fa-solid fa-map-location-dot display-1 text-primary opacity-25"></i>
            </div>
            <h1 class="display-1 fw-bold text-primary">404</h1>
            <h2 class="mb-3 fw-bold text-dark">Trang không tồn tại</h2>
            <p class="text-muted mb-5 fs-5">Xin lỗi, đường dẫn bạn truy cập không hợp lệ hoặc tài liệu đã bị gỡ bỏ khỏi hệ thống.</p>
            <div class="d-flex gap-3 justify-content-center">
                <a href="javascript:history.back()" class="btn btn-light btn-lg rounded-pill px-4 border shadow-sm">
                    <i class="fa-solid fa-arrow-left me-2"></i>Quay lại
                </a>
                <a href="/" class="btn btn-primary btn-lg rounded-pill px-5 shadow">
                    <i class="fa-solid fa-house me-2"></i>Trang chủ
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
