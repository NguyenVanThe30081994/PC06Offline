{% extends "base_mobile.html" %}

{% block title %}Đăng ký mới - BDHV{% endblock %}

{% block content %}
<div class="animate__animated animate__fadeIn">
    <!-- Navigation -->
    <div class="d-flex align-items-center mb-3">
        <button class="btn btn-light rounded-4 me-2" onclick="history.back()">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <a href="/bdhv" class="btn btn-outline-primary rounded-4">
            <i class="fa-solid fa-house"></i>
        </a>
    </div>
    
    <h1 class="h5 fw-bold mb-3">Đăng ký mới</h1>
    
    <form method="POST" action="/bdhv/dang-ky">
        <div class="mb-3">
            <label class="form-label fw-bold">Họ tên</label>
            <input type="text" name="ho_ten" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">CCCD</label>
            <input type="text" name="cccd" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">Đơn vị</label>
            <select name="don_vi" class="form-select" required>
                <option value="">-- Chọn đơn vị --</option>
                {% for dv in don_vi_list %}
                <option value="{{ dv.ten_don_vi }}">{{ dv.ten_don_vi }}</option>
                {% endfor %}
            </select>
        </div>
        
        <button type="submit" class="btn btn-primary w-100 rounded-4">Đăng ký</button>
    </form>
</div>
{% endblock %}
